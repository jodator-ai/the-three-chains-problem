name: zksync-three-chains-problem

services:
  l1:
    image: ghcr.io/foundry-rs/foundry:v1.3.4
    volumes:
      - /home/claude/three-chain-problem/the-three-chains-problem/configs/v30.2/l1-state.json.gz:/l1-state.json.gz:ro
      - l1state:/home/foundry/l1state
    entrypoint: ''
    user: 'root'
    ports:
      - '5010:5010'
    healthcheck:
      test: ['CMD-SHELL', 'cast chain-id -r http://localhost:5010']
      interval: 10s
      timeout: 5s
      retries: 5
    command: |
      bash -c "
      if [[ ! -f /home/foundry/l1state/state.json ]]; then
        echo 'Decompressing L1 state...'
        gzip -d < /l1-state.json.gz > /home/foundry/l1state/state.json
      fi
      anvil --state=/home/foundry/l1state/state.json --preserve-historical-states --port 5010 --host 0.0.0.0
      "

  chain-6565:
    image: ghcr.io/matter-labs/zksync-os-server:latest
    platform: linux/amd64
    ports:
      - '5050:3050'
    environment:
      GENERAL_L1_RPC_URL: 'http://l1:5010'
    user: 'root'
    working_dir: '/app'
    entrypoint: ''
    command: ['/usr/bin/tini', '--', 'zksync-os-server', '--config', '/configs/chain_6565.yaml']
    volumes:
      - chain_6565_db:/db
      - /home/claude/three-chain-problem/the-three-chains-problem/configs/v30.2/chain_6565.yaml:/configs/chain_6565.yaml:ro
      - /home/claude/three-chain-problem/the-three-chains-problem/configs/v30.2/genesis.json:/app/local-chains/v30.2/genesis.json:ro
    depends_on:
      l1:
        condition: service_healthy
    healthcheck:
      test: ['CMD', '/usr/bin/bash', '-c', 'exec 3<>/dev/tcp/127.0.0.1/3050']
      interval: 10s
      timeout: 5s
      retries: 12
